openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Minecraft Aternos Server Manager API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: server
    description: Aternos server management
  - name: bot
    description: Bot management
  - name: settings
    description: Server settings
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /server/config:
    get:
      operationId: getServerConfig
      tags: [server]
      summary: Get server configuration
      responses:
        "200":
          description: Server config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerConfig"
    post:
      operationId: saveServerConfig
      tags: [server]
      summary: Save server configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServerConfigInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerConfig"

  /bot/status:
    get:
      operationId: getBotStatus
      tags: [bot]
      summary: Get bot status
      responses:
        "200":
          description: Bot status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/start:
    post:
      operationId: startBot
      tags: [bot]
      summary: Start the bot
      responses:
        "200":
          description: Bot started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/stop:
    post:
      operationId: stopBot
      tags: [bot]
      summary: Stop the bot
      responses:
        "200":
          description: Bot stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /server/players:
    get:
      operationId: getPlayers
      tags: [server]
      summary: Get online players
      responses:
        "200":
          description: Player list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerList"

  /server/logs:
    get:
      operationId: getServerLogs
      tags: [server]
      summary: Get server console logs
      responses:
        "200":
          description: Logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerLogs"

  /server/command:
    post:
      operationId: sendCommand
      tags: [server]
      summary: Send a command to the server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommandInput"
      responses:
        "200":
          description: Command result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"

  /server/stats:
    get:
      operationId: getServerStats
      tags: [server]
      summary: Get server statistics
      responses:
        "200":
          description: Server stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerStats"

  /server/chat:
    get:
      operationId: getChatHistory
      tags: [server]
      summary: Get chat history
      responses:
        "200":
          description: Chat history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatHistory"
    post:
      operationId: sendChatMessage
      tags: [server]
      summary: Send a chat message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "200":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /server/whitelist:
    get:
      operationId: getWhitelist
      tags: [server]
      summary: Get whitelist
      responses:
        "200":
          description: Whitelist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerNames"
    post:
      operationId: addToWhitelist
      tags: [server]
      summary: Add player to whitelist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerNameInput"
      responses:
        "200":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /server/whitelist/{name}:
    delete:
      operationId: removeFromWhitelist
      tags: [server]
      summary: Remove player from whitelist
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /server/banlist:
    get:
      operationId: getBanlist
      tags: [server]
      summary: Get ban list
      responses:
        "200":
          description: Ban list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerNames"
    post:
      operationId: banPlayer
      tags: [server]
      summary: Ban a player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerNameInput"
      responses:
        "200":
          description: Banned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /server/banlist/{name}:
    delete:
      operationId: unbanPlayer
      tags: [server]
      summary: Unban a player
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unbanned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /server/ops:
    get:
      operationId: getOpList
      tags: [server]
      summary: Get operators list
      responses:
        "200":
          description: Op list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerNames"
    post:
      operationId: addOp
      tags: [server]
      summary: Add operator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerNameInput"
      responses:
        "200":
          description: Opped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /server/ops/{name}:
    delete:
      operationId: removeOp
      tags: [server]
      summary: Remove operator
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /bot/schedules:
    get:
      operationId: getSchedules
      tags: [bot]
      summary: Get scheduled tasks
      responses:
        "200":
          description: Schedules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleList"
    post:
      operationId: createSchedule
      tags: [bot]
      summary: Create a scheduled task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"

  /bot/schedules/{id}:
    delete:
      operationId: deleteSchedule
      tags: [bot]
      summary: Delete a scheduled task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /server/plugins:
    get:
      operationId: getPlugins
      tags: [server]
      summary: Get plugins list
      responses:
        "200":
          description: Plugins
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginList"

  /server/backups:
    get:
      operationId: getBackups
      tags: [server]
      summary: Get backups list
      responses:
        "200":
          description: Backups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupList"
    post:
      operationId: createBackup
      tags: [server]
      summary: Create a backup
      responses:
        "200":
          description: Backup created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ServerConfig:
      type: object
      properties:
        serverIp:
          type: string
        serverPort:
          type: string
        botName:
          type: string
        botPassword:
          type: string
        hasLoginPlugin:
          type: boolean
        autoReconnect:
          type: boolean
        reconnectDelay:
          type: number
        version:
          type: string
        gameMode:
          type: string
        difficulty:
          type: string
        maxPlayers:
          type: number
        viewDistance:
          type: number
        spawnProtection:
          type: number
        pvp:
          type: boolean
        allowFlight:
          type: boolean
        enableWhitelist:
          type: boolean
        onlineMode:
          type: boolean
        announcePlayerAchievements:
          type: boolean
        enableCommandBlocks:
          type: boolean
        forceGamemode:
          type: boolean
        hardcore:
          type: boolean
        motd:
          type: string
        resourcePack:
          type: string
      required: [serverIp, botName, hasLoginPlugin, autoReconnect]

    ServerConfigInput:
      type: object
      properties:
        serverIp:
          type: string
        serverPort:
          type: string
        botName:
          type: string
        botPassword:
          type: string
        hasLoginPlugin:
          type: boolean
        autoReconnect:
          type: boolean
        reconnectDelay:
          type: number
        version:
          type: string
        gameMode:
          type: string
        difficulty:
          type: string
        maxPlayers:
          type: number
        viewDistance:
          type: number
        spawnProtection:
          type: number
        pvp:
          type: boolean
        allowFlight:
          type: boolean
        enableWhitelist:
          type: boolean
        onlineMode:
          type: boolean
        announcePlayerAchievements:
          type: boolean
        enableCommandBlocks:
          type: boolean
        forceGamemode:
          type: boolean
        hardcore:
          type: boolean
        motd:
          type: string
        resourcePack:
          type: string
      required: [serverIp, botName, hasLoginPlugin, autoReconnect]

    BotStatus:
      type: object
      properties:
        running:
          type: boolean
        connected:
          type: boolean
        uptime:
          type: number
        reconnectCount:
          type: number
        lastSeen:
          type: string
        health:
          type: number
        hunger:
          type: number
        position:
          $ref: "#/components/schemas/Position"
      required: [running, connected, uptime, reconnectCount]

    Position:
      type: object
      properties:
        x:
          type: number
        y:
          type: number
        z:
          type: number
      required: [x, y, z]

    PlayerList:
      type: object
      properties:
        players:
          type: array
          items:
            $ref: "#/components/schemas/Player"
        count:
          type: number
        maxPlayers:
          type: number
      required: [players, count, maxPlayers]

    Player:
      type: object
      properties:
        name:
          type: string
        uuid:
          type: string
        online:
          type: boolean
        pingMs:
          type: number
        gamemode:
          type: string
        health:
          type: number
        hunger:
          type: number
        isOp:
          type: boolean
        isBanned:
          type: boolean
        isWhitelisted:
          type: boolean
        joinedAt:
          type: string
      required: [name, online]

    ServerLogs:
      type: object
      properties:
        logs:
          type: array
          items:
            $ref: "#/components/schemas/LogEntry"
      required: [logs]

    LogEntry:
      type: object
      properties:
        timestamp:
          type: string
        level:
          type: string
        message:
          type: string
      required: [timestamp, level, message]

    CommandInput:
      type: object
      properties:
        command:
          type: string
      required: [command]

    CommandResult:
      type: object
      properties:
        success:
          type: boolean
        output:
          type: string
      required: [success]

    ServerStats:
      type: object
      properties:
        tps:
          type: number
        cpuUsage:
          type: number
        ramUsage:
          type: number
        ramTotal:
          type: number
        diskUsage:
          type: number
        diskTotal:
          type: number
        uptime:
          type: number
        playersOnline:
          type: number
        chunkCount:
          type: number
        entityCount:
          type: number
      required: [tps, cpuUsage, ramUsage, ramTotal, playersOnline]

    ChatHistory:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
      required: [messages]

    ChatMessage:
      type: object
      properties:
        id:
          type: string
        author:
          type: string
        message:
          type: string
        timestamp:
          type: string
        isBot:
          type: boolean
      required: [id, author, message, timestamp, isBot]

    ChatMessageInput:
      type: object
      properties:
        message:
          type: string
      required: [message]

    PlayerNames:
      type: object
      properties:
        players:
          type: array
          items:
            type: string
      required: [players]

    PlayerNameInput:
      type: object
      properties:
        name:
          type: string
      required: [name]

    ActionResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    ScheduleList:
      type: object
      properties:
        schedules:
          type: array
          items:
            $ref: "#/components/schemas/Schedule"
      required: [schedules]

    Schedule:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        command:
          type: string
        interval:
          type: number
        enabled:
          type: boolean
        lastRun:
          type: string
        nextRun:
          type: string
      required: [id, name, command, interval, enabled]

    ScheduleInput:
      type: object
      properties:
        name:
          type: string
        command:
          type: string
        interval:
          type: number
        enabled:
          type: boolean
      required: [name, command, interval, enabled]

    PluginList:
      type: object
      properties:
        plugins:
          type: array
          items:
            $ref: "#/components/schemas/Plugin"
      required: [plugins]

    Plugin:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        enabled:
          type: boolean
        description:
          type: string
        author:
          type: string
      required: [name, version, enabled]

    BackupList:
      type: object
      properties:
        backups:
          type: array
          items:
            $ref: "#/components/schemas/Backup"
      required: [backups]

    Backup:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        size:
          type: number
        createdAt:
          type: string
        status:
          type: string
      required: [id, name, size, createdAt, status]
