kind = "web"
previewPath = "/"
title = "Minecraft Aternos Server Manager"
version = "1.0.0"
id = "artifacts/mc-aternos-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18575

[services.development]
run = "pnpm --filter @workspace/mc-aternos-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mc-aternos-manager", "run", "build" ]
publicDir = "artifacts/mc-aternos-manager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18575"
BASE_PATH = "/"
